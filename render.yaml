services:
  - type: web
    name: todo-list-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: todo-list-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: todo-list-db
    plan: free
